# Tiny Tapeout project information
project:
  title:        "Barebones RISCV Instruction Parser "      # Project title
  author:       "Kailan Bugata"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A RISCV FD stage implementation with simplified ISA consisting of only R and I instructions"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_BarebonesRISCVKailanBugata"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "BarebonesRISCV.v"
    - "SmallAsyncRam.v"
    - "Control.v"
    - "DFF.v"
    - "Instruction_Parser.v"
    - "immediateParser.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "valid_inst"
  ui[1]: "intruction_i[0]"
  ui[2]: "intruction_i[1]"
  ui[3]: "intruction_i[2]"
  ui[4]: "intruction_i[3]"
  ui[5]: "intruction_i[4]"
  ui[6]: "intruction_i[5]"
  ui[7]: "intruction_i[6]"

  # Outputs
  uo[0]: "imm_o[0]"
  uo[1]: "imm_o[1]"
  uo[2]: "imm_o[2]"
  uo[3]: "ALUOp_o[0]"
  uo[4]: "ALUOp_o[1]"
  uo[5]: "ALUOp_o[2]"
  uo[6]: "ALUOp_o[3]"
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "intruction_i[7]"
  uio[1]: "intruction_i[8]"
  uio[2]: "intruction_i[9]"
  uio[3]: "intruction_i[10]"
  uio[4]: "intruction_i[11]"
  uio[5]: "intruction_i[12]"
  uio[6]: "intruction_i[13]"
  uio[7]: "ALUSrc_o"

# Do not change!
yaml_version: 6
